# If this proxy is behind an upstream proxy, forward the real IP
#set_real_ip_from <upstream>;
#real_ip_header X-Forwarded-For;

# Main inference-gateway service
upstream backend {
    # The internal hostname and port of the Gunicorn/Django service
    server 127.0.0.1:7000;
}

# Dashboard hosted as a separate WSGI/ASGI application
upstream dashboard {
    server 127.0.0.1:7001;
}

server {
    # Delay before sending a 504 Gateway timeout error
    proxy_read_timeout 1800s;

    # SSL Deployment
    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate <your cert>;
    ssl_certificate_key <your cert key>;
    include snippets/ssl-params.conf;

    server_name localhost; # Or your specific domain

    charset utf-8;

    # Block specific IP addresses
    #deny <ip>;

    # Root location - proxy all other requests to the Django app
    location = / {
        # Redirect root URL to the ALCF home page
        return 301 https://alcf.anl.gov;
    }

    # Error message when there is maintenance
    if (-f /var/www/maintenance_on) {
        return 503;
    }
    error_page 503 @maintenance;
    location @maintenance {
        default_type application/json;
        return 503 '{"detail": "Service is temporarily down for maintenance."}';
    }

    # Size of the payload for a request
    client_max_body_size 20M;

    location /resource_server/ {
        # General API rate limiting: 50 requests per second
        limit_req zone=api_limit burst=50 nodelay;

        # Custom error response for rate limited requests
        error_page 429 @rate_limit_error;

        proxy_pass http://backend;
        include proxy_params;
    }

    location /dashboard/ {
        proxy_pass http://dashboard/;
        include proxy_params;
    }

    location @rate_limit_error {
        internal;
        add_header Content-Type application/json always;
        return 429 '{"error": "Rate limit exceeded", "message": "Too many requests from your IP address. Please try again later.", "retry_after": "1 second"}';
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
